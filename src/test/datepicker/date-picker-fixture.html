<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date Picker Fixture</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .section h3 { margin-top: 0; }
        #status { margin-top: 10px; padding: 8px; background: #f0f0f0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Date Picker Test Fixture</h1>

    <!-- 1. HTML5 date input -->
    <div class="section" id="section-html5">
        <h3>1. HTML5 Date Input</h3>
        <input type="date" id="html5-date" data-testid="html5-date">
    </div>

    <!-- 2. Generic text input (formatted date) -->
    <div class="section" id="section-text">
        <h3>2. Text Input (dd/MM/yyyy)</h3>
        <input type="text" id="text-date" placeholder="dd/MM/yyyy" data-testid="text-date">
    </div>

    <!-- 3. AntD-style wrapper -->
    <div class="section" id="section-antd">
        <h3>3. AntD-Style Date Picker</h3>
        <div class="ant-picker" id="antd-date-picker">
            <div class="ant-picker-input">
                <input type="text" id="antd-date-input" placeholder="Select date" readonly>
            </div>
        </div>
    </div>

    <!-- 4. MUI-style wrapper -->
    <div class="section" id="section-mui">
        <h3>4. MUI-Style Date Picker</h3>
        <div class="MuiFormControl-root" id="mui-date-picker">
            <div class="MuiInputBase-root MuiTextField-root">
                <input type="text" id="mui-date-input" class="MuiInputBase-input" placeholder="mm/dd/yyyy">
            </div>
        </div>
    </div>

    <!-- 5. Angular Material style -->
    <div class="section" id="section-mat">
        <h3>5. Angular Material Date Picker</h3>
        <div class="mat-form-field" id="mat-date-picker">
            <input type="text" id="mat-date-input" class="mat-input-element mat-mdc-input-element" matInput placeholder="Choose a date">
        </div>
    </div>

    <!-- 6. PrimeNG style -->
    <div class="section" id="section-primeng">
        <h3>6. PrimeNG Calendar</h3>
        <span class="p-calendar p-component" id="primeng-calendar">
            <input type="text" id="primeng-date-input" class="p-inputtext p-component" placeholder="Select Date">
        </span>
    </div>

    <div id="status">Status: Ready</div>

    <script>
        window.dateValues = {};

        function recordChange(id, value) {
            window.dateValues[id] = value;
            document.getElementById('status').textContent = 'Status: Date set - ' + id + ' = ' + value;
        }

        document.getElementById('html5-date').addEventListener('change', function(e) {
            recordChange('html5', e.target.value);
        });
        document.getElementById('html5-date').addEventListener('input', function(e) {
            recordChange('html5', e.target.value);
        });

        document.getElementById('text-date').addEventListener('change', function(e) {
            recordChange('text', e.target.value);
        });
        document.getElementById('text-date').addEventListener('input', function(e) {
            recordChange('text', e.target.value);
        });

        document.getElementById('antd-date-input').addEventListener('change', function(e) {
            recordChange('antd', e.target.value);
        });
        document.getElementById('antd-date-input').addEventListener('input', function(e) {
            recordChange('antd', e.target.value);
        });

        document.getElementById('mui-date-input').addEventListener('change', function(e) {
            recordChange('mui', e.target.value);
        });
        document.getElementById('mui-date-input').addEventListener('input', function(e) {
            recordChange('mui', e.target.value);
        });

        document.getElementById('mat-date-input').addEventListener('change', function(e) {
            recordChange('mat', e.target.value);
        });
        document.getElementById('mat-date-input').addEventListener('input', function(e) {
            recordChange('mat', e.target.value);
        });

        document.getElementById('primeng-date-input').addEventListener('change', function(e) {
            recordChange('primeng', e.target.value);
        });
        document.getElementById('primeng-date-input').addEventListener('input', function(e) {
            recordChange('primeng', e.target.value);
        });
    </script>
</body>
</html>
